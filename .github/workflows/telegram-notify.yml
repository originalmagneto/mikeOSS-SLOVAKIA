name: Telegram notifikácie

on:
  push:
    branches: [main]
  release:
    types: [published]
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened]
  discussion:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    # neposielať notifikáciu o commite, ktorý spravil auto-README bot
    if: github.actor != 'github-actions[bot]'
    env:
      TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
      # ID topicu vo forum-skupine (voliteľné). Prázdne = hlavné vlákno „General".
      TG_TOPIC: ${{ vars.TELEGRAM_TOPIC_ID }}
    steps:
      - name: Skontroluj, či sú nastavené secrets
        id: guard
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Chýba TELEGRAM_TOKEN alebo TELEGRAM_CHAT_ID – preskakujem (nie je to chyba)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pošli správu do Telegramu
        if: steps.guard.outputs.ok == 'true'
        run: |
          set -euo pipefail
          esc() { sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          E="$GITHUB_EVENT_PATH"

          case "$GITHUB_EVENT_NAME" in
            push)
              N=$(jq '.commits | length' "$E")
              LIST=$(jq -r '.commits[] | "• " + (.message | split("\n")[0])' "$E" | head -10 | esc)
              COMPARE=$(jq -r '.compare' "$E")
              ACTOR=$(printf '%s' "$GITHUB_ACTOR" | esc)
              TEXT=$(printf '🚀 <b>Push do %s</b> — %s\n%s commit(ov):\n%s\n\n<a href="%s">Zobraziť zmeny na GitHube</a>' "$GITHUB_REF_NAME" "$ACTOR" "$N" "$LIST" "$COMPARE")
              ;;
            release)
              TAG=$(jq -r '.release.tag_name' "$E" | esc)
              NAME=$(jq -r '.release.name // .release.tag_name' "$E" | esc)
              URL=$(jq -r '.release.html_url' "$E")
              TEXT=$(printf '🎉 <b>Nový release</b> %s\n%s\n\n<a href="%s">Otvoriť release</a>' "$TAG" "$NAME" "$URL")
              ;;
            issues)
              ACT=$(jq -r '.action' "$E")
              NUM=$(jq -r '.issue.number' "$E")
              TITLE=$(jq -r '.issue.title' "$E" | esc)
              URL=$(jq -r '.issue.html_url' "$E")
              TEXT=$(printf '🐛 <b>Issue %s</b> #%s: %s\n\n<a href="%s">Otvoriť issue</a>' "$ACT" "$NUM" "$TITLE" "$URL")
              ;;
            pull_request)
              ACT=$(jq -r '.action' "$E")
              MERGED=$(jq -r '.pull_request.merged' "$E")
              if [ "$ACT" = "closed" ] && [ "$MERGED" = "true" ]; then ACT="merged ✅"; fi
              NUM=$(jq -r '.pull_request.number' "$E")
              TITLE=$(jq -r '.pull_request.title' "$E" | esc)
              URL=$(jq -r '.pull_request.html_url' "$E")
              TEXT=$(printf '🔀 <b>Pull request %s</b> #%s: %s\n\n<a href="%s">Otvoriť PR</a>' "$ACT" "$NUM" "$TITLE" "$URL")
              ;;
            discussion)
              TITLE=$(jq -r '.discussion.title' "$E" | esc)
              URL=$(jq -r '.discussion.html_url' "$E")
              TEXT=$(printf '💬 <b>Nová diskusia</b>: %s\n\n<a href="%s">Otvoriť diskusiu</a>' "$TITLE" "$URL")
              ;;
            *)
              TEXT="ℹ️ Udalosť: ${GITHUB_EVENT_NAME}"
              ;;
          esac

          # voliteľné smerovanie do konkrétneho topicu forum-skupiny
          TOPIC_ARG=()
          if [ -n "${TG_TOPIC:-}" ]; then
            TOPIC_ARG=(--data-urlencode "message_thread_id=${TG_TOPIC}")
          fi

          curl -sS "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            "${TOPIC_ARG[@]}" \
            --data-urlencode "text=${TEXT}" \
            -d parse_mode=HTML \
            -d disable_web_page_preview=true
